<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    
    <section class="register">
        <div class="container">

            <div class="logo">
                <img src="KCBlogo.png" alt="Logo" width="100px">
                <p>Secure</p>
            </div>

            <div class="hero">
                <h2>Create your account</h2>
                <p>Join KCB today and enjoy secure banking anytime, anywhere.</p>
            </div>

            <form id="register-form" #registerForm="ngForm" (ngSubmit)="onSubmit()">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" [(ngModel)]="user.firstName" name="firstName" placeholder="Enter your first name">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" [(ngModel)]="user.lastName" name="lastName" placeholder="Enter your last name">
                <label for="email">Email:</label>
                <input type="email" id="email" [(ngModel)]="user.email" name="email" placeholder="Enter your email">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" [(ngModel)]="user.phone" name="phone" placeholder="Enter your phone number">
                <label for="password">Password:</label>
                <input type="password" id="password" [(ngModel)]="user.password" name="password" placeholder="Enter your password">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" [(ngModel)]="user.confirmPassword" name="confirmPassword" placeholder="Confirm your password">

                <div class="terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms and Conditions</a>.</label>
                </div>
                <button type="submit">Register</button> 
            </form>
        </div>
    </section>
</body>
</html>
