<aside
  class="bg-green-500 border-r-green-100 shadow-2xl overflow-hidden transition-transform duration-300 ease-in-out fixed top-12 left-0 z-50 h-screen"
  [class.w-60]="sidebarOpen()"
  [class.w-0]="!sidebarOpen()"
>
  <div class="bg-green-600 h-20 w-60 flex items-center justify-center">
    <img src="KCBlogo.png" alt="Logo" class="w-25" />
  </div>
  <ul class="space-y-4 text-white">
    <li routerLink="/dashboard" routerLinkActive="active" class="hover:bg-green-400" (click)="itemClicked.emit()">
      Dashboard
    </li>
    <li routerLink="/accounts" routerLinkActive="active" class="hover:bg-green-400" (click)="itemClicked.emit()">Accounts</li>
    <li routerLink="/transactions" routerLinkActive="active" class="hover:bg-green-400" (click)="itemClicked.emit()">
      Transaction
    </li>
    <!-- <li routerLink="/payments" routerLinkActive="active">Payments</li> -->
    <!-- <li routerLink="/cards" routerLinkActive="active">Cards</li> -->
    <li routerLink="/loans" routerLinkActive="active" class="hover:bg-green-400" (click)="itemClicked.emit()">Loans</li>
    <li routerLink="/investments" routerLinkActive="active" class="hover:bg-green-400" (click)="itemClicked.emit()">
      Investments
    </li>
    <li routerLink="/profile" routerLinkActive="active" class="hover:bg-green-400" (click)="itemClicked.emit()">Profile</li>
    <li routerLink="/setting" routerLinkActive="active" class="hover:bg-green-400" (click)="itemClicked.emit()">Setting</li>
    <li routerLink="/help" routerLinkActive="active" class="hover:bg-green-400" (click)="itemClicked.emit()">
      Help & Support
    </li>
  </ul>
</aside>
